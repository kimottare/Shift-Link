<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ShiftLink</title>
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ShiftLink">
  
  <!-- iPhoneホーム画面用アイコン (カレンダーデザイン) -->
  <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/240/calendar--v1.png">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { -webkit-tap-highlight-color: transparent; }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased selection:bg-blue-200">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // 自作SVGアイコン（外部ライブラリの衝突回避）
    const SafeIcon = ({ name, className }) => {
      const svgProps = {
        xmlns: "http://www.w3.org/2000/svg", width: "24", height: "24", viewBox: "0 0 24 24",
        fill: "none", stroke: "currentColor", strokeWidth: "2", strokeLinecap: "round", strokeLinejoin: "round",
        className: className
      };
      const icons = {
        Calendar: <><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></>,
        Settings: <><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></>,
        X: <><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></>,
        Info: <><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></>,
        Save: <><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></>,
        AlertCircle: <><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></>,
        Upload: <><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></>,
        FolderOpen: <><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path><line x1="22" y1="10" x2="2" y2="10"></line></>,
        RefreshCw: <><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></>,
        User: <><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></>,
        Users: <><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></>,
        Plus: <><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></>,
        Trash2: <><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></>,
        ChevronLeft: <><polyline points="15 18 9 12 15 6"></polyline></>,
        ChevronRight: <><polyline points="9 18 15 12 9 6"></polyline></>
      };
      return <svg {...svgProps}>{icons[name] || icons.Info}</svg>;
    };

    const App = () => {
      const [shifts, setShifts] = useState([]);
      const [displayMonth, setDisplayMonth] = useState('');
      const [selectedDate, setSelectedDate] = useState('');
      const [showSettings, setShowSettings] = useState(false);
      const [confirmClear, setConfirmClear] = useState(false);
      const [myName, setMyName] = useState('小澤直樹');
      const [showUploadModal, setShowUploadModal] = useState(false);
      const [uploadMonth, setUploadMonth] = useState('');
      const [uploadErrorMsg, setUploadErrorMsg] = useState('');
      const fileInputRef = useRef(null);

      useEffect(() => {
        const savedName = localStorage.getItem('shiftlink_name');
        const savedShifts = localStorage.getItem('shiftlink_shifts');
        if (savedName) setMyName(savedName);

        const today = new Date();
        const currentYM = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}`;
        setUploadMonth(currentYM);

        if (savedShifts) {
          try {
            const parsed = JSON.parse(savedShifts);
            if (parsed && parsed.length > 0) {
              setShifts(parsed);
              const uniqueMonths = Array.from(new Set(parsed.map(s => {
                  const parts = s.date.split('/');
                  return `${parts[0]}-${parts[1]}`;
              }))).sort();

              if (uniqueMonths.includes(currentYM)) {
                  setDisplayMonth(currentYM);
                  const todayStrFull = `${currentYM.replace('-', '/')}/${String(today.getDate()).padStart(2, '0')}`;
                  setSelectedDate(todayStrFull);
              } else {
                  const latestMonth = uniqueMonths[uniqueMonths.length - 1];
                  setDisplayMonth(latestMonth);
                  const firstDate = parsed.find(s => s.date.startsWith(latestMonth.replace('-', '/')))?.date;
                  if(firstDate) setSelectedDate(firstDate);
              }
            }
          } catch (e) { console.error(e); }
        }
      }, []);

      const saveSettings = () => {
        localStorage.setItem('shiftlink_name', myName);
        setShowSettings(false);
        setConfirmClear(false);
      };

      const doClearData = () => {
        localStorage.removeItem('shiftlink_shifts');
        setShifts([]);
        setDisplayMonth('');
        setSelectedDate('');
        setShowSettings(false);
        setConfirmClear(false);
      };

      const handleFileUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        setUploadErrorMsg('');
        const reader = new FileReader();
        reader.onload = (evt) => {
          try {
            const buffer = evt.target.result;
            const uint8Array = new Uint8Array(buffer);
            let parsedShifts = [];
            let text = new TextDecoder('shift-jis').decode(uint8Array);
            try { parsedShifts = parseSimpleCSV(text, myName, uploadMonth); }
            catch (err) {
              try {
                const utf8Text = new TextDecoder('utf-8').decode(uint8Array);
                parsedShifts = parseSimpleCSV(utf8Text, myName, uploadMonth);
              } catch (utf8Err) { throw err; }
            }
            const uploadPrefix = uploadMonth.replace('-', '/');
            const filteredShifts = shifts.filter(s => !s.date.startsWith(uploadPrefix));
            const mergedShifts = [...filteredShifts, ...parsedShifts];
            setShifts(mergedShifts);
            setDisplayMonth(uploadMonth);
            const firstDateOfUpload = parsedShifts[0]?.date;
            if (firstDateOfUpload) setSelectedDate(firstDateOfUpload);
            localStorage.setItem('shiftlink_shifts', JSON.stringify(mergedShifts));
            setShowUploadModal(false);
          } catch (err) { setUploadErrorMsg(err.message || '読み込みに失敗しました。'); }
          finally { if (fileInputRef.current) fileInputRef.current.value = ''; }
        };
        reader.readAsArrayBuffer(file);
      };

      const parseSimpleCSV = (csvText, targetName, ym) => {
        const lines = csvText.split(/\r?\n/);
        if (lines.length < 2) throw new Error('データが空のようです');
        const cleanStr = (str) => str ? str.replace(/^"|"$/g, '').trim() : '';
        const headers = lines[0].split(',').map(cleanStr);
        const results = [];
        const cleanTarget = targetName.replace(/[\s　]/g, '');
        let nameFound = false;
        const year = parseInt(ym.split('-')[0], 10);
        const month = parseInt(ym.split('-')[1], 10);
        const getDayOfWeek = (y, m, d) => ['日', '月', '火', '水', '木', '金', '土'][new Date(y, m - 1, d).getDay()];

        for (let i = 1; i < lines.length; i++) {
          const cols = lines[i].split(',');
          if (cols.length < 2) continue; 
          const rowName = cleanStr(cols[0]);
          if (!rowName) continue;
          const cleanRowName = rowName.replace(/[\s　]/g, '');
          if (cleanRowName === cleanTarget) nameFound = true;
          for (let c = 1; c < headers.length; c++) {
            const dayStr = headers[c];
            let shiftVal = cleanStr(cols[c]);
            if (dayStr && !isNaN(dayStr)) {
              if (shiftVal === '' || shiftVal === undefined) continue;
              if (shiftVal === '-') shiftVal = '休';
              const day = parseInt(dayStr, 10);
              const dateStr = `${year}/${String(month).padStart(2, '0')}/${String(day).padStart(2, '0')}`;
              results.push({ date: dateStr, name: rowName, cleanName: cleanRowName, shift: shiftVal });
            }
          }
        }
        if (!nameFound) throw new Error(`「${targetName}」さんが見つかりません。`);
        return results;
      };

      const hasData = shifts.length > 0;
      const availableMonths = Array.from(new Set(shifts.map(s => {
        const parts = s.date.split('/');
        return `${parts[0]}-${parts[1]}`;
      }))).sort();
      const displayPrefix = displayMonth ? displayMonth.replace('-', '/') : '';
      const monthShifts = displayPrefix ? shifts.filter(s => s.date.startsWith(displayPrefix)) : [];
      const todaysShifts = selectedDate ? monthShifts.filter(s => s.date === selectedDate) : [];
      const cleanTargetName = myName.replace(/[\s　]/g, '');
      const myShift = todaysShifts.find(s => s.cleanName === cleanTargetName);
      
      const restShiftKeywords = ['休', '法定', '所定', 'P', '0'];
      const workingMembers = todaysShifts.filter(s => {
        if (s.cleanName === cleanTargetName) return false; 
        if (restShiftKeywords.includes(s.shift)) return false; 
        return true;
      });

      const formatDisplayDateWithDay = (dateStr) => {
        if(!dateStr) return '';
        const dayOfWeek = ['日', '月', '火', '水', '木', '金', '土'][new Date(dateStr).getDay()];
        const [y, m, d] = dateStr.split('/');
        return `${parseInt(m, 10)}月${parseInt(d, 10)}日 (${dayOfWeek})`;
      };

      const uniqueDatesAll = Array.from(new Set(shifts.map(s => s.date))).sort();
      const currentIndexAll = uniqueDatesAll.indexOf(selectedDate);
      const hasPrev = currentIndexAll > 0;
      const hasNext = currentIndexAll < uniqueDatesAll.length - 1 && currentIndexAll !== -1;

      const handlePrevDay = () => {
        if (hasPrev) {
          const prevDate = uniqueDatesAll[currentIndexAll - 1];
          setSelectedDate(prevDate);
          const prevMonth = prevDate.substring(0, 7).replace('/', '-');
          if (prevMonth !== displayMonth) setDisplayMonth(prevMonth);
        }
      };
      const handleNextDay = () => {
        if (hasNext) {
          const nextDate = uniqueDatesAll[currentIndexAll + 1];
          setSelectedDate(nextDate);
          const nextMonth = nextDate.substring(0, 7).replace('/', '-');
          if (nextMonth !== displayMonth) setDisplayMonth(nextMonth);
        }
      };

      const renderCalendar = () => {
        if (!displayMonth) return null;
        const [yearStr, monthStr] = displayMonth.split('-');
        const year = parseInt(yearStr, 10);
        const month = parseInt(monthStr, 10);
        const firstDay = new Date(year, month - 1, 1).getDay();
        const lastDate = new Date(year, month, 0).getDate();
        const daysArray = Array(firstDay).fill(null);
        for (let i = 1; i <= lastDate; i++) daysArray.push(i);
        const myShiftsMap = {};
        monthShifts.forEach(s => { if (s.cleanName === cleanTargetName) myShiftsMap[parseInt(s.date.split('/')[2], 10)] = s.shift; });

        return (
          <div className="bg-white rounded-3xl p-3 shadow-sm mb-6 border border-slate-100">
            <div className="grid grid-cols-7 gap-1 mb-1 text-center">
              {['日', '月', '火', '水', '木', '金', '土'].map((d, i) => (
                <div key={i} className={`text-[10px] font-bold ${i === 0 ? 'text-rose-500' : i === 6 ? 'text-blue-500' : 'text-slate-400'}`}>{d}</div>
              ))}
            </div>
            <div className="grid grid-cols-7 gap-1">
              {daysArray.map((d, i) => {
                if (!d) return <div key={i} className="h-12"></div>;
                const dateStr = `${year}/${String(month).padStart(2, '0')}/${String(d).padStart(2, '0')}`;
                const hasD = uniqueDatesAll.includes(dateStr);
                const isS = selectedDate === dateStr;
                const shift = myShiftsMap[d];
                return (
                  <button key={i} disabled={!hasD} onClick={() => setSelectedDate(dateStr)}
                    className={`flex flex-col items-center justify-center h-12 rounded-xl transition-all relative ${isS ? 'bg-blue-600 text-white shadow-md' : hasD ? 'bg-slate-50' : 'opacity-20'}`}>
                    <span className="text-sm font-bold">{d}</span>
                    {hasD && <span className={`text-[10px] font-black truncate w-full text-center ${isS ? 'text-blue-100' : restShiftKeywords.includes(shift) ? 'text-slate-400' : 'text-blue-500'}`}>{shift || '-'}</span>}
                  </button>
                );
              })}
            </div>
          </div>
        );
      };

      return (
        <div className="min-h-screen max-w-md mx-auto relative bg-slate-50 shadow-2xl border-x border-slate-200 overflow-hidden font-sans">
          <header className="bg-white px-5 pt-14 pb-4 shadow-sm sticky top-0 z-20 flex justify-between items-center rounded-b-2xl">
            <div className="flex items-center gap-3">
              <div className="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-md shadow-blue-200">
                <SafeIcon name="Calendar" className="text-white w-6 h-6" />
              </div>
              <div>
                <h1 className="text-xl font-extrabold text-slate-800 tracking-tight">ShiftLink</h1>
                <p className="text-[10px] font-medium text-slate-400">Personal Shift Viewer</p>
              </div>
            </div>
            <div className="flex items-center gap-2">
              {hasData && <button onClick={() => setShowUploadModal(true)} className="p-2.5 text-blue-600 bg-blue-50 rounded-full active:scale-95 border border-blue-100"><SafeIcon name="Plus" className="w-5 h-5" /></button>}
              <button onClick={() => setShowSettings(true)} className="p-2.5 text-slate-400 bg-white rounded-full active:scale-95 border border-slate-100"><SafeIcon name="Settings" className="w-5 h-5" /></button>
            </div>
          </header>

          {showUploadModal && (
            <div className="fixed inset-0 bg-slate-900/60 z-50 flex items-end sm:items-center justify-center backdrop-blur-sm animate-fade-in p-0">
              <div className="bg-white w-full max-w-md sm:rounded-3xl rounded-t-3xl p-6 shadow-2xl pb-10">
                <div className="flex justify-between items-center mb-6">
                  <h2 className="text-xl font-bold text-slate-800 flex items-center gap-2"><SafeIcon name="Upload" className="w-6 h-6 text-blue-600"/> シフトを追加</h2>
                  <button onClick={() => setShowUploadModal(false)} className="bg-slate-100 p-2 rounded-full text-slate-500"><SafeIcon name="X" className="w-5 h-5"/></button>
                </div>
                {uploadErrorMsg && <div className="text-sm text-red-600 bg-red-50 p-3 rounded-xl mb-5">{uploadErrorMsg}</div>}
                <div className="space-y-5">
                  <div><label className="block text-sm font-bold text-slate-700 mb-2">対象月</label><input type="month" value={uploadMonth} onChange={e => setUploadMonth(e.target.value)} className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3.5" /></div>
                  <input type="file" accept=".csv, text/csv, text/plain, application/vnd.ms-excel, application/csv" onChange={handleFileUpload} ref={fileInputRef} className="hidden" />
                  <button onClick={() => fileInputRef.current?.click()} className="w-full bg-blue-600 text-white py-4 rounded-xl font-bold flex justify-center items-center gap-2 shadow-lg shadow-blue-200"><SafeIcon name="FolderOpen" className="w-5 h-5"/> CSV選択</button>
                </div>
              </div>
            </div>
          )}

          {showSettings && (
            <div className="fixed inset-0 bg-slate-900/60 z-50 flex items-end sm:items-center justify-center backdrop-blur-sm animate-fade-in p-0">
              <div className="bg-white w-full max-w-md sm:rounded-3xl rounded-t-3xl p-6 shadow-2xl pb-10">
                <div className="flex justify-between items-center mb-6"><h2 className="text-xl font-bold text-slate-800">設定</h2><button onClick={() => setShowSettings(false)} className="bg-slate-100 p-2 rounded-full text-slate-500"><SafeIcon name="X" className="w-5 h-5"/></button></div>
                <div className="space-y-5">
                  <div><label className="block text-sm font-bold text-slate-700 mb-2">名前</label><input type="text" value={myName} onChange={e => setMyName(e.target.value)} className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3.5" /></div>
                  <button onClick={saveSettings} className="w-full bg-slate-800 text-white py-4 rounded-xl font-bold shadow-lg">保存する</button>
                  <div className="pt-6 border-t border-slate-100 mt-6 text-center">
                    {confirmClear ? (<div className="bg-red-50 p-4 rounded-xl border border-red-100"><p className="text-sm text-red-700 font-bold mb-4">データを全削除しますか？</p><div className="flex gap-2"><button onClick={doClearData} className="flex-1 bg-red-600 text-white py-3 rounded-lg font-bold">削除</button><button onClick={() => setConfirmClear(false)} className="flex-1 bg-white text-slate-600 border py-3 rounded-lg font-bold">戻る</button></div></div>)
                    : (<button onClick={() => setConfirmClear(true)} className="w-full bg-white text-red-600 border border-red-200 py-3.5 rounded-xl font-bold flex justify-center items-center gap-2 shadow-sm"><SafeIcon name="Trash2" className="w-5 h-5"/> データをリセット</button>)}
                  </div>
                </div>
              </div>
            </div>
          )}

          <main className="px-5 py-6 pb-24 overflow-y-auto max-h-[calc(100vh-80px)] scrollbar-hide">
            {!hasData ? (
              <div className="bg-white p-8 rounded-3xl shadow-sm border border-slate-100 flex flex-col items-center text-center mt-4">
                <div className="w-20 h-20 bg-blue-50 rounded-full flex items-center justify-center mb-5"><SafeIcon name="Calendar" className="text-blue-600 w-10 h-10" /></div>
                <h2 className="text-xl font-bold text-slate-800 mb-2">シフトを読み込む</h2>
                <p className="text-sm text-slate-500 mb-8 leading-relaxed">まずはシフト表（CSV形式）を<br/>追加してください。</p>
                <button onClick={() => setShowUploadModal(true)} className="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold shadow-lg"><SafeIcon name="Plus" className="w-5 h-5" /> シフトを追加</button>
              </div>
            ) : (
              <div className="animate-fade-in">
                <div className="mb-4 -mx-5 px-5 flex gap-2.5 overflow-x-auto pb-2 scrollbar-hide snap-x">
                  {availableMonths.map(m => (
                    <button key={m} onClick={() => { setDisplayMonth(m); const fd = shifts.find(s => s.date.startsWith(m.replace('-', '/')))?.date; if (fd) setSelectedDate(fd); }}
                      className={`snap-start shrink-0 px-5 py-2 rounded-full text-sm font-bold border transition-all ${displayMonth === m ? 'bg-slate-800 text-white border-slate-800 shadow-md' : 'bg-white text-slate-500 border-slate-200'}`}>
                      {m.split('-')[0]}年{parseInt(m.split('-')[1], 10)}月
                    </button>
                  ))}
                </div>
                {renderCalendar()}
                <div className="flex items-center justify-between px-1 mb-3">
                  <button onClick={handlePrevDay} disabled={!hasPrev} className={`p-3 rounded-full flex items-center justify-center transition-all ${hasPrev ? 'bg-white text-slate-700 shadow-sm border border-slate-200 active:scale-90' : 'opacity-10'}`}><SafeIcon name="ChevronLeft" className="w-5 h-5" /></button>
                  <h3 className="text-lg font-black text-slate-800 tracking-tight">{formatDisplayDateWithDay(selectedDate)}</h3>
                  <button onClick={handleNextDay} disabled={!hasNext} className={`p-3 rounded-full flex items-center justify-center transition-all ${hasNext ? 'bg-white text-slate-700 shadow-sm border border-slate-200 active:scale-90' : 'opacity-10'}`}><SafeIcon name="ChevronRight" className="w-5 h-5" /></button>
                </div>
                <div className={`p-6 rounded-3xl shadow-sm mb-8 border ${!myShift ? 'bg-slate-50 border-dashed' : restShiftKeywords.includes(myShift.shift) ? 'bg-slate-100 border-slate-300' : 'bg-white border-blue-100 relative overflow-hidden'}`}>
                  {myShift && !restShiftKeywords.includes(myShift.shift) && <div className="absolute top-0 right-0 w-24 h-24 bg-blue-50 rounded-bl-full -z-0 opacity-50"></div>}
                  <div className="flex justify-between items-center relative z-10">
                    <div><h2 className="text-2xl font-extrabold text-slate-800 tracking-tight leading-tight">{myName}</h2><p className="text-xs font-bold text-slate-400 mt-1 uppercase tracking-wider">Your Shift</p></div>
                    <div className={`flex flex-col items-center justify-center w-20 h-20 rounded-2xl shadow-inner ${!myShift ? 'bg-slate-100 text-slate-400' : restShiftKeywords.includes(myShift.shift) ? 'bg-slate-200 text-slate-500' : 'bg-gradient-to-br from-blue-50 to-blue-100 text-blue-600 border border-blue-200'}`}><span className="text-[10px] font-bold mb-0.5 opacity-60">SHIFT</span><p className="font-black text-3xl">{myShift ? myShift.shift : '?'}</p></div>
                  </div>
                </div>
                <div className="flex items-center justify-between mb-4 px-1"><h3 className="text-sm font-bold text-slate-500 flex items-center gap-1.5"><SafeIcon name="Users" className="w-4 h-4" /> 出勤メンバー</h3><span className="text-xs bg-slate-200 text-slate-600 px-2.5 py-1 rounded-full font-bold">{workingMembers.length} 名</span></div>
                <div className="space-y-3">
                  {workingMembers.length > 0 ? workingMembers.map((m, idx) => (
                    <div key={idx} className="bg-white p-4 rounded-2xl flex items-center justify-between shadow-sm border border-slate-100">
                      <div className="flex items-center gap-4"><div className="w-11 h-11 rounded-full bg-slate-100 text-slate-500 flex items-center justify-center font-bold text-sm shrink-0">{m.name.charAt(0)}</div><div><p className="font-bold text-slate-800 text-base">{m.name}</p></div></div>
                      <div className="text-right flex items-center justify-center w-12 h-12 bg-slate-50 rounded-xl border shrink-0"><p className="font-black text-slate-700 text-xl">{m.shift}</p></div>
                    </div>
                  )) : <div className="text-center text-slate-400 bg-slate-50 p-6 rounded-2xl border border-dashed text-sm font-medium">出勤メンバーはいません</div>}
                </div>
              </div>
            )}
          </main>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
